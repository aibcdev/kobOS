# Netlify: Import from Git (repo root). Do NOT use drag-and-drop.
# Env vars + checklist: docs/DEPLOYMENT.md
# Clear “Publish directory” in Netlify UI if build fails (this file sets publish = ".next").

[build]
  command = "npm run build"
  publish = ".next"

# Netlify secrets scanner flags env values that also appear in docs/code (e.g. uk_cold, trykob.com).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NETLIFY_PRODUCTION_URL,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_SITE_URL,OUTBOUND_MODE,GEMINI_MODEL,AUDIT_RATE_LIMIT_WINDOW_SEC,AUDIT_RATE_LIMIT_MAX_REQUESTS,RESEND_AUTH_FROM_EMAIL,RESEND_FROM_EMAIL,OUTBOUND_UK_CITIES,OUTBOUND_SALES_MODE,PLACES_AUTOCOMPLETE_REGIONS,OUTBOUND_REVIEW_MIN,OUTBOUND_REVIEW_MAX,OUTBOUND_MAX_QUALIFY_SCORE,OUTBOUND_UK_DAILY_CAP,AUDIT_BROWSERBASE_ASYNC"

[[plugins]]
  package = "@netlify/plugin-nextjs"
