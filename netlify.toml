# Netlify: Import from Git (repo root). Do NOT use drag-and-drop.
# Env vars + checklist: docs/DEPLOYMENT.md
# Clear “Publish directory” in Netlify UI if build fails (this file sets publish = ".next").

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
